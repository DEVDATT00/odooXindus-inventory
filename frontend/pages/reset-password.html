<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>CoreInventory • Reset Password</title>

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="data:," type="image/x-icon">

  <style>
    /***************************************************************
     * CoreInventory - Design System & Variables
     ***************************************************************/
    :root {
      --bg:               #f8fafc;
      --surface:          #ffffff;
      --surface-hover:    #f1f5f9;
      --text:             #0f172a;
      --text-secondary:   #64748b;
      --text-muted:       #94a3b8;
      --border:           #e2e8f0;
      --primary:          #3b82f6;
      --primary-dark:     #2563eb;
      --primary-light:    #60a5fa;
      --success:          #10b981;
      --warning:          #f59e0b;
      --danger:           #ef4444;
      --gray:             #6b7280;
      --radius-sm:        6px;
      --radius:           10px;
      --radius-lg:        16px;
      --shadow-sm:        0 1px 3px rgba(0,0,0,0.06);
      --shadow:           0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-md:        0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      --transition:       all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg:               #0f172a;
      --surface:          #1e293b;
      --surface-hover:    #334155;
      --text:             #f1f5f9;
      --text-secondary:   #94a3b8;
      --text-muted:       #cbd5e1;
      --border:           #334155;
      --shadow-sm:        0 1px 3px rgba(0,0,0,0.3);
      --shadow:           0 10px 15px -3px rgba(0,0,0,0.4);
      --shadow-md:        0 20px 25px -5px rgba(0,0,0,0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 480px;
    }

    .auth-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .auth-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 2.8rem 2rem 2rem;
      text-align: center;
      position: relative;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1.2px;
    }

    .logo span {
      font-weight: 300;
      opacity: 0.92;
    }

    .auth-header h1 {
      font-size: 1.55rem;
      font-weight: 600;
      margin-top: 0.8rem;
    }

    .auth-header p {
      font-size: 0.94rem;
      opacity: 0.9;
      margin-top: 0.7rem;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .theme-toggle-btn {
      position: absolute;
      top: 1.6rem;
      right: 1.6rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: white;
      cursor: pointer;
      transition: var(--transition);
    }

    .theme-toggle-btn:hover {
      transform: scale(1.15);
    }

    .auth-body {
      padding: 2.6rem 2.5rem 2.5rem;
    }

    .form-group {
      margin-bottom: 1.7rem;
    }

    .form-label {
      display: block;
      font-size: 0.97rem;
      font-weight: 500;
      margin-bottom: 0.6rem;
      color: var(--text-secondary);
    }

    .otp-container {
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    .otp-input {
      width: 100%;
      max-width: 54px;
      height: 54px;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      transition: var(--transition);
    }

    .otp-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .otp-input::-webkit-inner-spin-button,
    .otp-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .input-field {
      width: 100%;
      padding: 0.95rem 1.15rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      transition: var(--transition);
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3.5px rgba(59,130,246,0.16);
    }

    .input-field.error {
      border-color: var(--danger);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.15rem;
    }

    .password-strength {
      height: 4px;
      border-radius: var(--radius-sm);
      margin-top: 0.5rem;
      transition: width 0.4s ease;
      width: 0%;
    }

    .strength-weak   { background: var(--danger); }
    .strength-fair   { background: var(--warning); width: 33%; }
    .strength-good   { background: #f97316;     width: 66%; }
    .strength-strong { background: var(--success); width: 100%; }

    .error-message {
      color: var(--danger);
      font-size: 0.84rem;
      margin-top: 0.4rem;
      display: none;
    }

    .success-message {
      background: rgba(16,185,129,0.12);
      color: var(--success);
      padding: 1rem;
      border-radius: var(--radius);
      margin: 1.2rem 0;
      text-align: center;
      font-weight: 500;
      display: none;
    }

    .btn-primary {
      width: 100%;
      padding: 1.05rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 1.06rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 1.2rem;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--gray);
      cursor: not-allowed;
    }

    .back-link {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.97rem;
      color: var(--text-secondary);
    }

    .back-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .auth-body { padding: 2.2rem 1.8rem 2rem; }
      .otp-input { height: 48px; font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">

    <div class="auth-card">

      <div class="auth-header">
        <div class="logo">Core<span>Inventory</span></div>
        <h1>Set New Password</h1>
        <p>Enter the OTP sent to your email and choose a strong new password</p>
        <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
      </div>

      <div class="auth-body">

        <form id="resetForm" novalidate>

          <!-- OTP Input -->
          <div class="form-group">
            <label class="form-label">Verification Code (OTP)</label>
            <div class="otp-container">
              <input type="text" maxlength="1" class="otp-input" id="otp1" autofocus required>
              <input type="text" maxlength="1" class="otp-input" id="otp2" required>
              <input type="text" maxlength="1" class="otp-input" id="otp3" required>
              <input type="text" maxlength="1" class="otp-input" id="otp4" required>
              <input type="text" maxlength="1" class="otp-input" id="otp5" required>
              <input type="text" maxlength="1" class="otp-input" id="otp6" required>
            </div>
            <div class="error-message" id="otpError">Please enter the 6-digit code</div>
          </div>

          <!-- New Password -->
          <div class="form-group">
            <label class="form-label" for="newPassword">New Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="newPassword"
                class="input-field"
                placeholder="At least 8 characters"
                required
                minlength="8"
              >
              <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">👁️</button>
            </div>
            <div id="passwordStrength" class="password-strength"></div>
            <div class="error-message" id="newPasswordError">Password must be at least 8 characters long</div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm New Password</label>
            <input
              type="password"
              id="confirmPassword"
              class="input-field"
              placeholder="Re-enter new password"
              required
            >
            <div class="error-message" id="confirmError">Passwords do not match</div>
          </div>

          <div class="success-message" id="successMsg">
            Password has been successfully reset!<br>
            Redirecting to login...
          </div>

          <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>

        </form>

        <div class="back-link">
          <a href="login.html">← Back to Sign In</a>
        </div>

      </div>

    </div>

  </div>

  <script>
    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);

      const btn = document.querySelector('.theme-toggle-btn');
      btn.textContent = next === 'dark' ? '☀️' : '🌙';
    }

    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.querySelector('.theme-toggle-btn').textContent = '☀️';
    }

    // Password visibility toggle
    function togglePassword(id) {
      const input = document.getElementById(id);
      const btn = input.nextElementSibling;
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    // OTP auto-focus & paste handling
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < 5) {
          otpInputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
          otpInputs[index - 1].focus();
        }
      });

      // Handle paste of full OTP
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('text').trim();
        if (/^\d{6}$/.test(pasteData)) {
          pasteData.split('').forEach((digit, i) => {
            if (otpInputs[i]) otpInputs[i].value = digit;
          });
          otpInputs[5].focus();
        }
      });
    });

    // Password strength indicator
    const pwdInput = document.getElementById('newPassword');
    const strengthBar = document.getElementById('passwordStrength');

    pwdInput.addEventListener('input', () => {
      const val = pwdInput.value;
      let strength = 'weak';

      if (val.length >= 12 && /[A-Z]/.test(val) && /[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) {
        strength = 'strong';
      } else if (val.length >= 10 && /[A-Z]/.test(val) && /[0-9]/.test(val)) {
        strength = 'good';
      } else if (val.length >= 8 && /[A-Z]/.test(val)) {
        strength = 'fair';
      }

      strengthBar.className = 'password-strength strength-' + strength;
    });

    // Form submission handling (client-side simulation)
    document.getElementById('resetForm').addEventListener('submit', function(e) {
      e.preventDefault();

      let isValid = true;
      document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');

      // OTP validation
      const otp = Array.from(otpInputs).map(i => i.value).join('');
      if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
        document.getElementById('otpError').style.display = 'block';
        isValid = false;
      }

      // Password validation
      const newPwd = document.getElementById('newPassword').value;
      if (newPwd.length < 8) {
        document.getElementById('newPasswordError').style.display = 'block';
        isValid = false;
      }

      // Confirm match
      const confirmPwd = document.getElementById('confirmPassword').value;
      if (newPwd !== confirmPwd) {
        document.getElementById('confirmError').style.display = 'block';
        isValid = false;
      }

      if (!isValid) return;

      // Simulate success
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('resetBtn').disabled = true;
      document.getElementById('resetBtn').textContent = 'Resetting...';

      setTimeout(() => {
        alert('Password reset successful! (demo)');
        window.location.href = 'login.html';
      }, 1800);
    });
  </script>

</body>
</html>
