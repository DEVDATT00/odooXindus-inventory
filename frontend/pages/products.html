<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>CoreInventory • Products</title>

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="data:," type="image/x-icon">

  <style>
    /***************************************************************
     * CoreInventory - Shared Design System
     ***************************************************************/
    :root {
      --bg:               #f8fafc;
      --surface:          #ffffff;
      --surface-hover:    #f1f5f9;
      --text:             #0f172a;
      --text-secondary:   #64748b;
      --text-muted:       #94a3b8;
      --border:           #e2e8f0;
      --primary:          #3b82f6;
      --primary-dark:     #2563eb;
      --primary-light:    #60a5fa;
      --success:          #10b981;
      --warning:          #f59e0b;
      --danger:           #ef4444;
      --gray:             #6b7280;
      --radius-sm:        6px;
      --radius:           10px;
      --radius-lg:        16px;
      --shadow-sm:        0 1px 3px rgba(0,0,0,0.06);
      --shadow:           0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-md:        0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      --transition:       all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg:               #0f172a;
      --surface:          #1e293b;
      --surface-hover:    #334155;
      --text:             #f1f5f9;
      --text-secondary:   #94a3b8;
      --text-muted:       #cbd5e1;
      --border:           #334155;
      --shadow-sm:        0 1px 3px rgba(0,0,0,0.3);
      --shadow:           0 10px 15px -3px rgba(0,0,0,0.4);
      --shadow-md:        0 20px 25px -5px rgba(0,0,0,0.5);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: 100vh;
    }

    /* Sidebar (same as dashboard) */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo {
      padding: 0 1.5rem 2rem;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.8px;
    }

    .nav-list {
      list-style: none;
    }

    .nav-item a {
      display: flex;
      align-items: center;
      padding: 0.9rem 1.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }

    .nav-item a:hover,
    .nav-item a.active {
      background: rgba(59,130,246,0.08);
      color: var(--primary);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      margin-right: 14px;
      stroke: currentColor;
      stroke-width: 2;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: var(--shadow-sm);
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.15rem;
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .logout-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 0.55rem 1.2rem;
      border-radius: var(--radius);
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    /* Main Content */
    .main-content {
      padding: 2rem;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      position: relative;
      min-width: 280px;
    }

    .search-input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.8rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      background: var(--surface);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .btn {
      padding: 0.8rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-add::before {
      content: "+";
      font-size: 1.3rem;
      font-weight: bold;
    }

    .table-container {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1.1rem 1.2rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--surface-hover);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 0.5px;
    }

    tr:hover {
      background: var(--surface-hover);
    }

    .status-badge {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .status-instock { background: rgba(16,185,129,0.15); color: var(--success); }
    .status-low     { background: rgba(245,158,11,0.15); color: var(--warning); }
    .status-out     { background: rgba(239,68,68,0.15); color: var(--danger); }

    .actions {
      display: flex;
      gap: 1rem;
    }

    .action-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .action-link.delete {
      color: var(--danger);
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      margin-top: 2rem;
      padding: 1rem;
    }

    .page-btn {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      transition: var(--transition);
    }

    .page-btn:hover {
      background: var(--primary-light);
      color: white;
      border-color: var(--primary);
    }

    .page-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    @media (max-width: 992px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    @media (max-width: 768px) {
      .page-header { flex-direction: column; align-items: flex-start; }
      .controls { width: 100%; }
      .search-box { min-width: 100%; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">CoreInventory</div>
    
    <ul class="nav-list">
      <li class="nav-item"><a href="dashboard.html">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dashboard
      </a></li>
      <li class="nav-item"><a href="products.html" class="active">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
        Products
      </a></li>
      <li class="nav-item"><a href="receipts.html">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
        Receipts
      </a></li>
      <li class="nav-item"><a href="deliveries.html">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM4 18V6h16v12H4z"/></svg>
        Deliveries
      </a></li>
      <li class="nav-item"><a href="transfers.html">
        <svg viewBox="0 0 24 24"><path d="M16 11l-6-6v4H2v4h8v4l6-6zM20 4h-6v2h6v12h-6v2h6c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
        Transfers
      </a></li>
      <li class="nav-item"><a href="adjustments.html">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        Adjustments
      </a></li>
      <li class="nav-item"><a href="stock-history.html">
        <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z"/></svg>
        Stock History
      </a></li>
      <li class="nav-item"><a href="settings.html">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Settings
      </a></li>
    </ul>
  </aside>

  <!-- Main Area -->
  <div>

    <header class="header">
      <h1>Products</h1>
      <div id="product-count" style="color:var(--text-secondary);font-size:14px;"></div>
      <div class="user-info">
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <div class="avatar">VI</div>
        <div>
          <div style="font-weight:600;">vgec ict 009 d2d</div>
          <div style="font-size:0.88rem; color:var(--text-secondary);">Inventory Manager</div>
        </div>
        <button class="logout-btn">Logout</button>
      </div>
    </header>

    <main class="main-content">

      <div class="page-header">
        <h2 class="page-title">Product Catalog</h2>
        
        <div class="controls">
          <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="search-input" placeholder="Search by name, SKU or category...">
          </div>
          <a href="product-add.html" class="btn btn-add">Add New Product</a>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>SKU</th>
              <th>Product Name</th>
              <th>Category</th>
              <th>UOM</th>
              <th>Stock Level</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="product-table">
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button class="page-btn">« Prev</button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn">4</button>
        <button class="page-btn">Next »</button>
      </div>

    </main>
  </div>
</div>

<script>

  let allProducts = []
  let filteredProducts = []
  let currentPage = 1
  const rowsPerPage = 8
  
  document.addEventListener("DOMContentLoaded",()=>{
  
  checkLogin()
  loadUser()
  loadProducts()
  
  document.querySelector(".search-input")
  .addEventListener("input",searchProducts)
  
  })
  
  /* =========================
  LOGIN CHECK
  ========================= */
  
  function checkLogin(){
  
  const user = localStorage.getItem("user")
  
  if(!user){
  window.location.href="login.html"
  }
  
  }
  
  /* =========================
  LOAD USER
  ========================= */
  
  function loadUser(){
  
  const user = JSON.parse(localStorage.getItem("user"))
  
  document.querySelector(".avatar").textContent =
  user.name.charAt(0).toUpperCase()
  
  document.querySelector(".user-info div div:nth-child(1)").textContent =
  user.name
  
  document.querySelector(".user-info div div:nth-child(2)").textContent =
  user.role
  
  }
  
  /* =========================
  LOAD PRODUCTS
  ========================= */
  
  async function loadProducts(){
  
  try{
  
  const res = await fetch("http://localhost:5000/api/products")
  
  if(!res.ok) throw new Error("API error")
  
  allProducts = await res.json()
  
  filteredProducts = allProducts
  
  renderTable()
  
  const countElement = document.getElementById("product-count")
  if(countElement){
  countElement.innerText = `${allProducts.length} products`
  }
  
  }catch(err){
  
  console.error(err)
  alert("Failed to load products")
  
  }
  
  }
  
  /* =========================
  RENDER TABLE
  ========================= */
  
  function renderTable(){
  
  const table = document.getElementById("product-table")
  
  table.innerHTML=""
  
  const start = (currentPage-1)*rowsPerPage
  const end = start + rowsPerPage
  
  const pageProducts = filteredProducts.slice(start,end)
  
  if(pageProducts.length === 0){
  
  table.innerHTML = `
  <tr>
  <td colspan="7" style="text-align:center;padding:20px;">
  No products found
  </td>
  </tr>
  `
  
  return
  
  }
  
  pageProducts.forEach(p=>{
  
  let badge=""
  
  if(p.status==="instock")
  badge=`<span class="status-badge status-instock">In Stock</span>`
  
  if(p.status==="low")
  badge=`<span class="status-badge status-low">Low Stock</span>`
  
  if(p.status==="out")
  badge=`<span class="status-badge status-out">Out</span>`
  
  table.innerHTML+=`
  
  <tr>
  
  <td>${p.sku || "-"}</td>
  <td>${p.name || "-"}</td>
  <td>${p.category || "-"}</td>
  <td>${p.unit || "-"}</td>
  <td>${p.stock ?? 0}</td>
  <td>${badge}</td>
  
  <td class="actions">
  
  <a href="product-edit.html?id=${p.id}" class="action-link">Edit</a>
  
  <a href="#" onclick="deleteProduct(${p.id})" class="action-link delete">Delete</a>
  
  </td>
  
  </tr>
  
  `
  
  })
  
  renderPagination()
  
  }
  
  /* =========================
  SEARCH
  ========================= */
  
  function searchProducts(e){
  
  const term = e.target.value.toLowerCase()
  
  filteredProducts = allProducts.filter(p=>
  
  (p.name && p.name.toLowerCase().includes(term)) ||
  (p.sku && p.sku.toLowerCase().includes(term)) ||
  (p.category && p.category.toLowerCase().includes(term))
  
  )
  
  currentPage = 1
  
  renderTable()
  
  }
  
  /* =========================
  PAGINATION
  ========================= */
  
  function renderPagination(){
  
  const pagination = document.querySelector(".pagination")
  
  pagination.innerHTML=""
  
  const pageCount = Math.ceil(filteredProducts.length / rowsPerPage)
  
  for(let i=1;i<=pageCount;i++){
  
  pagination.innerHTML+=`
  
  <button class="page-btn ${i===currentPage?"active":""}"
  onclick="changePage(${i})">
  
  ${i}
  
  </button>
  
  `
  
  }
  
  }
  
  function changePage(page){
  
  currentPage = page
  
  renderTable()
  
  }
  
  /* =========================
  DELETE PRODUCT
  ========================= */
  
  async function deleteProduct(id){
  
  if(!confirm("Delete this product?")) return
  
  try{
  
  const res = await fetch(`http://localhost:5000/api/products/${id}`,{
  method:"DELETE"
  })
  
  if(!res.ok) throw new Error("Delete failed")
  
  loadProducts()
  
  }catch(err){
  
  console.error(err)
  alert("Error deleting product")
  
  }
  
  }
  
  /* =========================
  LOGOUT
  ========================= */
  
  document.querySelector(".logout-btn").addEventListener("click",()=>{
  
  localStorage.removeItem("user")
  
  window.location.href="login.html"
  
  })
  
  </script>

</body>
</html>
