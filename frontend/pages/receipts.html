<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>CoreInventory • Receipts</title>

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="data:," type="image/x-icon">

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --text: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --primary-light: #60a5fa;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray: #6b7280;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --transition: all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #cbd5e1;
      --border: #334155;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo {
      padding: 0 1.5rem 2rem;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.8px;
    }

    .nav-list {
      list-style: none;
    }

    .nav-item a {
      display: flex;
      align-items: center;
      padding: 0.9rem 1.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }

    .nav-item a:hover,
    .nav-item a.active {
      background: rgba(59, 130, 246, 0.08);
      color: var(--primary);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      margin-right: 14px;
      stroke: currentColor;
      stroke-width: 2;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: var(--shadow-sm);
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.15rem;
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .main-content {
      padding: 2rem;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .search-box {
      position: relative;
      min-width: 260px;
    }

    .search-input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.8rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      background: var(--surface);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .filter-select,
    .date-input {
      padding: 0.8rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-size: 0.95rem;
      min-width: 160px;
    }

    .btn {
      padding: 0.8rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-add::before {
      content: "+";
      font-size: 1.3rem;
      font-weight: bold;
    }

    .table-container {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-top: 1.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 1.1rem 1.2rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--surface-hover);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 0.4px;
    }

    tr:hover {
      background: var(--surface-hover);
    }

    .status-badge {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 600;
      display: inline-block;
    }

    .status-draft {
      background: rgba(107, 114, 128, 0.15);
      color: var(--gray);
    }

    .status-pending {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .status-received {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    .status-canceled {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    .actions {
      display: flex;
      gap: 1.2rem;
    }

    .action-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .action-link:hover {
      text-decoration: underline;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      margin-top: 2.5rem;
      padding: 1rem;
    }

    .page-btn {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      transition: var(--transition);
    }

    .page-btn:hover {
      background: var(--primary-light);
      color: white;
      border-color: var(--primary);
    }

    .page-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    @media (max-width: 992px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        flex-direction: column;
        width: 100%;
      }

      .search-box,
      .filter-select,
      .date-input {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>

    <!-- Sidebar -->

    <div>

      <header class="header">
        <h1>Receipts</h1>

        <div class="user-info">
          <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
          <div class="avatar">VI</div>
          <div>
            <div style="font-weight:600;">vgec ict 009 d2d</div>
            <div style="font-size:0.88rem; color:var(--text-secondary);">Inventory Manager</div>
          </div>
        </div>
      </header>

      <main class="main-content">

        <div class="page-header">
          <h2 class="page-title">Incoming Receipts</h2>

          <div class="controls">
            <div class="search-box">
              <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="text" class="search-input" placeholder="Search by supplier, reference or product...">
            </div>

            <select class="filter-select">
              <option value="">All Status</option>
              <option value="draft">Draft</option>
              <option value="pending">Pending</option>
              <option value="received">Received</option>
              <option value="canceled">Canceled</option>
            </select>

            <input type="date" class="date-input" placeholder="From Date">

            <a href="receipt-add.html" class="btn btn-add">Create New Receipt</a>
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Reference #</th>
                <th>Supplier</th>
                <th>Date</th>
                <th>Items</th>
                <th>Total Value (₹)</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="receiptsTable">

            </tbody>
          </table>
        </div>

        <div class="pagination">
          <button class="page-btn">« Prev</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">Next »</button>
        </div>

      </main>
    </div>
  </div>

  <script>
     
 
     function loadUser(){
  
  const user = JSON.parse(localStorage.getItem("user"))
  
  document.querySelector(".avatar").textContent =
  user.name.charAt(0).toUpperCase()
  
  document.querySelector(".user-info div div:nth-child(1)").textContent =
  user.name
  
  document.querySelector(".user-info div div:nth-child(2)").textContent =
  user.role
  
  }
    async function loadReceipts() {

      try {

        const res = await fetch("http://127.0.0.1:5000/api/receipts/");
        const receipts = await res.json();

        const table = document.getElementById("receiptsTable");
        table.innerHTML = "";

        receipts.forEach(r => {

          const row = `
<tr>
  <td>${r.id}</td>
  <td>${r.supplier}</td>
  <td>${r.created_at}</td>
  <td>${r.items || 0}</td>
  <td>${r.total_value || 0}</td>
  <td>${r.status}</td>
  <td class="actions">
    <a href="receipt-view.html?id=${r.id}" class="action-link">View</a>
  </td>
</tr>
`;

          table.innerHTML += row;

        });

      } catch (error) {
        console.error("Error loading receipts:", error);
      }

    }

    loadReceipts();
  </script>
